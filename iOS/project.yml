name: Panelbook
options:
  bundleIdPrefix: com.shimondeitel.stainedglasslog
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Panelbook:
    type: application
    platform: iOS
    sources:
      - path: Panelbook
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.stainedglasslog
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Panelbook/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  PanelbookTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: PanelbookTests
      - path: Panelbook.storekit
    dependencies:
      - target: Panelbook
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.stainedglasslog.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  PanelbookUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: PanelbookUITests
    dependencies:
      - target: Panelbook
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.stainedglasslog.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Panelbook:
    build:
      targets:
        Panelbook: all
        PanelbookTests: [test]
        PanelbookUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Panelbook.storekit
    test:
      config: Debug
      storeKitConfiguration: Panelbook.storekit
      targets:
        - PanelbookTests
        - PanelbookUITests
    archive:
      config: Release
